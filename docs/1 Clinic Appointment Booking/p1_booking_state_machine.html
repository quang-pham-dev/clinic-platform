<style>
.s { cursor: pointer; }
.s rect { transition: opacity 0.15s; }
.s:hover rect { opacity: 0.82; }
.s.active rect { stroke-width: 2 !important; }
#info { padding: 14px 16px; border-radius: 8px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); margin-top: 12px; min-height: 72px; }
</style>
<svg width="100%" viewBox="0 0 680 460">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="ts" x="150" y="14" text-anchor="middle">Happy path</text>
<text class="ts" x="490" y="14" text-anchor="middle">Terminal branches</text>
<line x1="300" y1="10" x2="300" y2="450" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 4"/>

<line x1="150" y1="74" x2="150" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="150" y1="194" x2="150" y2="258" class="arr" marker-end="url(#arrow)"/>
<line x1="150" y1="314" x2="150" y2="378" class="arr" marker-end="url(#arrow)"/>

<path d="M 250 46 L 330 46 L 330 96 L 398 96" fill="none" class="arr" marker-end="url(#arrow)" stroke-opacity="0.7"/>
<path d="M 250 157 L 360 157 L 360 116 L 398 116" fill="none" class="arr" marker-end="url(#arrow)" stroke-opacity="0.7"/>
<path d="M 250 175 L 380 175 L 380 236 L 398 236" fill="none" class="arr" marker-end="url(#arrow)" stroke-opacity="0.7"/>

<g id="pending" class="s c-amber" onclick="show('pending')">
<rect x="50" y="20" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="150" y="37" text-anchor="middle" dominant-baseline="central">Pending</text>
<text class="ts" x="150" y="55" text-anchor="middle" dominant-baseline="central">Awaiting confirmation</text>
</g>

<g id="confirmed" class="s c-teal" onclick="show('confirmed')">
<rect x="50" y="140" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="150" y="157" text-anchor="middle" dominant-baseline="central">Confirmed</text>
<text class="ts" x="150" y="175" text-anchor="middle" dominant-baseline="central">Slot locked</text>
</g>

<g id="in_progress" class="s c-blue" onclick="show('in_progress')">
<rect x="50" y="260" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="150" y="277" text-anchor="middle" dominant-baseline="central">In progress</text>
<text class="ts" x="150" y="295" text-anchor="middle" dominant-baseline="central">Visit active</text>
</g>

<g id="completed" class="s c-green" onclick="show('completed')">
<rect x="50" y="380" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="150" y="397" text-anchor="middle" dominant-baseline="central">Completed</text>
<text class="ts" x="150" y="415" text-anchor="middle" dominant-baseline="central">Terminal state</text>
</g>

<g id="cancelled" class="s c-red" onclick="show('cancelled')">
<rect x="400" y="70" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="500" y="87" text-anchor="middle" dominant-baseline="central">Cancelled</text>
<text class="ts" x="500" y="105" text-anchor="middle" dominant-baseline="central">Terminal state</text>
</g>

<g id="no_show" class="s c-coral" onclick="show('no_show')">
<rect x="400" y="210" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="500" y="227" text-anchor="middle" dominant-baseline="central">No show</text>
<text class="ts" x="500" y="245" text-anchor="middle" dominant-baseline="central">Terminal state</text>
</g>
</svg>

<div id="info">
<p style="margin:0;font-size:13px;color:var(--color-text-secondary)">Click a state to see details and transitions</p>
</div>

<script>
const data = {
  pending: {
    label: 'Pending',
    desc: 'Patient created a booking. Slot is soft-reserved but not locked.',
    by: 'Patient submits booking form',
    transitions: ['Confirmed — doctor or admin accepts', 'Cancelled — patient withdraws or admin rejects']
  },
  confirmed: {
    label: 'Confirmed',
    desc: 'Slot is hard-locked. Patient receives email + push notification.',
    by: 'Doctor or admin confirms',
    transitions: ['In progress — receptionist checks patient in', 'Cancelled — admin cancels the visit', 'No show — patient does not arrive']
  },
  in_progress: {
    label: 'In progress',
    desc: 'Patient is checked in. Visit is live. Doctor can add notes.',
    by: 'Receptionist check-in action',
    transitions: ['Completed — doctor marks visit as done']
  },
  completed: {
    label: 'Completed',
    desc: 'Visit finished. Prescriptions and records can be attached. No further transitions.',
    by: 'Doctor action',
    transitions: []
  },
  cancelled: {
    label: 'Cancelled',
    desc: 'Booking cancelled. Slot is released back to the available pool.',
    by: 'Patient or admin action from Pending or Confirmed',
    transitions: []
  },
  no_show: {
    label: 'No show',
    desc: 'Patient did not arrive within the check-in window. Slot stays blocked.',
    by: 'Automatic trigger or manual admin action',
    transitions: []
  }
};
function show(id) {
  const d = data[id];
  const terminalNote = d.transitions.length === 0
    ? '<p style="margin:6px 0 0;font-size:12px;color:var(--color-text-tertiary)">No further transitions — terminal state</p>'
    : '<ul style="margin:6px 0 0;padding-left:18px;font-size:12px;color:var(--color-text-secondary)">' + d.transitions.map(t => `<li style="margin-bottom:2px">${t}</li>`).join('') + '</ul>';
  document.getElementById('info').innerHTML =
    `<p style="margin:0;font-size:13px;font-weight:500;color:var(--color-text-primary)">${d.label}</p>` +
    `<p style="margin:4px 0 0;font-size:12px;color:var(--color-text-secondary)">${d.desc}</p>` +
    `<p style="margin:8px 0 0;font-size:12px;color:var(--color-text-tertiary)">Triggered by: ${d.by}</p>` +
    terminalNote;
  document.querySelectorAll('.s').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
