<style>
#erd svg.erDiagram .divider path{stroke-opacity:.5;}
#erd svg.erDiagram .row-rect-odd path,#erd svg.erDiagram .row-rect-odd rect,#erd svg.erDiagram .row-rect-even path,#erd svg.erDiagram .row-rect-even rect{stroke:none!important;}
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark=matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({startOnLoad:false,theme:'base',fontFamily:'"Anthropic Sans",sans-serif',themeVariables:{darkMode:dark,fontSize:'13px',fontFamily:'"Anthropic Sans",sans-serif',lineColor:dark?'#9c9a92':'#73726c',textColor:dark?'#c2c0b6':'#3d3d3a'}});
const{svg}=await mermaid.render('erd-svg',`erDiagram
USERS ||--o| STAFF_PROFILES : "is staff"
USERS ||--o{ SHIFT_ASSIGNMENTS : receives
USERS ||--o{ BROADCAST_MESSAGES : sends
DEPARTMENTS ||--o{ STAFF_PROFILES : groups
DEPARTMENTS ||--o{ SHIFT_ASSIGNMENTS : "shift in"
SHIFT_TEMPLATES ||--o{ SHIFT_ASSIGNMENTS : defines

USERS {
uuid id PK
string email UK
string role
boolean is_active
}
DEPARTMENTS {
uuid id PK
string name
uuid head_nurse_id FK
}
STAFF_PROFILES {
uuid id PK
uuid user_id FK
uuid department_id FK
string staff_role
string employee_no
}
SHIFT_TEMPLATES {
uuid id PK
string name
time start_time
time end_time
string color_hex
}
SHIFT_ASSIGNMENTS {
uuid id PK
uuid staff_id FK
uuid template_id FK
uuid department_id FK
date shift_date
string status
string notes
}
BROADCAST_MESSAGES {
uuid id PK
uuid sender_id FK
string target_room
text message
timestamp sent_at
}`);
document.getElementById('erd').innerHTML=svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node=>{
const fp=node.querySelector('path[d]');if(!fp)return;
const nums=fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
if(!nums||nums.length<8)return;
const xs=[nums[0],nums[2],nums[4],nums[6]],ys=[nums[1],nums[3],nums[5],nums[7]];
const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
for(const a of['fill','stroke','stroke-width','class','style']){if(fp.hasAttribute(a))r.setAttribute(a,fp.getAttribute(a));}
fp.replaceWith(r);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path,#erd svg.erDiagram .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
</script>
